<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Frontend Mentor | Blog preview card</title>
  </head>
  <body>
    <main>
      <article>
        <section class="first">
          <img
            src="./assets/images/illustration-article.svg"
            alt="Course Image"
          />

          <p class="textpreset4"><span>Learning</span></p>
          <p class="textpreset3">Published 21 Dec 2023</p>
        </section>
        <section class="second">
          <h1 class="textpreset1">HTML & CSS foundations</h1>
          <p class="textpreset2">
            These languages are the backbone of every website, defining
            structure, content, and presentation.
          </p>
        </section>
        <section class="third">
          <img src="./assets/images/image-avatar.webp" alt="Profie Image" />
          <p class="textpreset4">Greg Hooper</p>
        </section>
      </article>
    </main>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Raley17</a>.
    </footer>
  </body>
</html>
